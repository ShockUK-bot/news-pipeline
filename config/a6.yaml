# A6 Position Review configuration (Phase 8). Recommendation-only:
# auto-apply is OFF (A12-v1 pattern) — enabling it is a future baseline
# rule-12 evidence decision, not a config flip here.
report:
  send_on_nonsession: false    # holidays: journal SKIPPED_NO_SESSION, exit

review:
  stale_weeks: 4               # long-lane staleness rule (baseline L3):
                               # no escalated news in N weeks -> STALE_FLAG
  max_positions: 20            # safety cap per run

alert:
  email: true                  # nightly trim/exit/stale recos -> one ALERT
                               # email via journal.outbox (quiet nights: none)

# --- EOD overnight-hold check (15:45 ET, DURING market hours) --------------
# Analyst slot ONLY — the heavy model never runs during market hours
# (memory rule). Probe-first; wake reuses the a13-wake sudoers rule.
eod:
  endpoint: "http://127.0.0.1:8081"
  model_id: "qwen3.6-27b-q5_k_m"
  temperature: 0.0
  max_tokens: 900
  timeout_secs: 180
  retries_on_invalid: 1
  wake:
    enabled: true
    command: "sudo systemctl start llama-a2.service"
    probe_timeout_secs: 3
    ready_timeout_secs: 240
    poll_secs: 5

# --- nightly deep review (20:00 ET, off-hours) -----------------------------
narrative:                     # model-call parameters (SlotManager contract)
  max_tokens: 700              # one call PER position
  temperature: 0.0
  timeout_secs: 300
  retries_on_invalid: 1

heavy:
  endpoint: "http://127.0.0.1:8084"
  model_id: "qwen3.5-122b-a10b-q4_k_m"
  disable_thinking: true       # v0.12.4 — thinking burns the whole token budget; see backends.py
  autostart: true              # 20:00 ET is off-hours; stopped again after
  stop_after_use: true
  start_command: "sudo systemctl start llama-heavy.service"
  stop_command: "sudo systemctl stop llama-heavy.service"
  probe_timeout_secs: 5
  ready_timeout_secs: 420
  poll_secs: 10

analyst_fallback:
  enabled: true
  endpoint: "http://127.0.0.1:8081"
  model_id: "qwen3.6-27b-q5_k_m"
  wake:
    enabled: true
    command: "sudo systemctl start llama-a2.service"
    probe_timeout_secs: 3
    ready_timeout_secs: 240
    poll_secs: 5
