# A8 Morning Briefing configuration (Phase 9).
report:
  send_on_nonsession: false    # holidays: journal SKIPPED_NO_SESSION, exit

briefing:
  blackout_warn_sessions: 2    # flag held names reporting within N sessions

narrative:
  max_tokens: 900
  temperature: 0.0
  timeout_secs: 240
  retries_on_invalid: 1

# Narrative slot: 07:35 ET is pre-open — heavy AUTOSTART IS OFF (memory
# rule; A4 already stopped the slot it started at 07:00). Probe-first still
# uses a heavy server the operator left running; otherwise the analyst
# slot narrates (wake reuses the a13 rule).
heavy:
  endpoint: "http://127.0.0.1:8084"
  model_id: "qwen3.5-122b-a10b-q4_k_m"
  disable_thinking: true       # v0.12.4 — thinking burns the whole token budget; see backends.py
  autostart: false             # never boot 77GB pre-open just for narrative
  stop_after_use: false        # ...and never stop a server we didn't start
  probe_timeout_secs: 3

analyst_fallback:
  enabled: true
  endpoint: "http://127.0.0.1:8081"
  model_id: "qwen3.6-27b-q5_k_m"
  wake:
    enabled: true
    command: "sudo systemctl start llama-a2.service"
    probe_timeout_secs: 3
    ready_timeout_secs: 240
    poll_secs: 5
